<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENOIN - AI IPTV Player</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* Google TV Style Theme */
        :root {
            --nav-height: 64px; 
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #0f1014;
            color: #e8eaed;
            overflow-x: hidden;
            padding-top: var(--nav-height); 
        }

        /* Glassmorphism Navbar */
        .navbar-glass {
            background: rgba(15, 16, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            height: var(--nav-height);
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }

        .brand-logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: #ffffff !important;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        /* Full-Width AI Search Bar */
        .ai-search-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 8px 20px;
            color: white;
            transition: all 0.3s ease;
        }
        .ai-search-box:focus-within {
            background: rgba(255, 255, 255, 0.15);
            border-color: #4285f4;
            box-shadow: 0 0 15px rgba(66, 133, 244, 0.3);
        }
        .ai-search-box input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
        }
        .ai-search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* PARALLAX STICKY PLAYER */
        .sticky-player-wrapper {
            position: sticky;
            top: var(--nav-height);
            z-index: 10; /* Lower z-index so content slides OVER it */
            padding-top: 1.5rem;
            padding-bottom: 1.5rem;
            /* Fades slightly as content goes over it */
            transition: opacity 0.3s ease;
        }

        /* Hero Section & Player Container */
        .hero-section {
            height: 55vh; 
            min-height: 400px;
            position: relative; 
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Reset styles for true fullscreen */
        .hero-section:fullscreen, 
        .hero-section:-webkit-full-screen {
            border-radius: 0 !important;
            border: none;
        }
        .video-container:fullscreen, 
        .video-container.is-fullscreen {
            border-radius: 0 !important;
            background: #000 !important;
        }

        .hero-bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, #0f1014 0%, rgba(15, 16, 20, 0.2) 100%), 
                        url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
            transition: opacity 0.5s ease;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 15;
            width: 100%;
            padding-bottom: 3rem; 
            transition: opacity 0.5s ease;
        }

        .ai-badge {
            background: linear-gradient(45deg, #8a2be2, #4285f4);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .live-badge {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Custom Video Player */
        .video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            display: none;
            background: #000;
            overflow: hidden;
        }

        #main-player {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; 
            box-shadow: inset 0 0 150px rgba(15, 16, 20, 0.9), inset 0 0 60px rgba(15, 16, 20, 0.7);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .video-container:fullscreen .vignette,
        .video-container.is-fullscreen .vignette {
            opacity: 0;
        }

        .video-loader-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: none; 
            text-align: center;
        }
        
        .spinner-glow {
            width: 3.5rem;
            height: 3.5rem;
            color: #4285f4;
            filter: drop-shadow(0 0 10px rgba(66, 133, 244, 0.8));
        }

        /* Hero-Style Player Overlay */
        .player-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            display: flex;
            flex-direction: column;
            padding-bottom: 2rem; 
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            transition: opacity 0.4s ease;
            z-index: 20;
        }

        .player-info-hero {
            margin-bottom: 15px;
        }

        .player-controls-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }

        .video-container.is-fullscreen.hide-controls { cursor: none; }
        .video-container.is-fullscreen.hide-controls .player-overlay { opacity: 0; pointer-events: none; }

        .control-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
        }
        .control-btn:hover {
            transform: scale(1.1);
            color: #4285f4;
        }

        .text-shadow { text-shadow: 0 4px 10px rgba(0,0,0,0.8); }

        input[type=range] {
            -webkit-appearance: none;
            width: 120px;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #4285f4;
            cursor: pointer;
            margin-top: -5px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }

        /* MAIN CONTENT OVERLAY (The Slide-Over Container)
           Sits naturally below the player, but higher z-index lets it slide over.
        */
        .main-content-overlay {
            position: relative;
            z-index: 30; /* Higher than player wrapper */
            background-color: #0f1014; /* Solid body color to hide video as it scrolls */
            padding-top: 2rem;
            min-height: 100vh; /* Ensure page can be scrolled */
            /* Massive shadow creates a cinematic fade blend as it slides over the player */
            box-shadow: 0 -30px 40px rgba(15, 16, 20, 0.95);
        }

        /* Horizontal Scroll Wrapper for the First Row */
        .scrolling-wrapper {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 15px;
            padding-bottom: 15px;
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }
        .scrolling-wrapper::-webkit-scrollbar {
            display: none;
        }
        .scrolling-wrapper .channel-card {
            flex: 0 0 160px; /* Fixed width for horizontal items */
            width: 160px;
        }

        /* Normal Grid Layout */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            padding-bottom: 15px;
        }

        /* Minimized Channel Cards */
        .channel-card {
            width: 100%;
            background: #1a1c23;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }
        
        .channel-card:hover {
            transform: scale(1.05);
            border-color: #e8eaed;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            z-index: 2;
        }
        .channel-card.active {
            border-color: #4285f4;
            box-shadow: 0 0 15px rgba(66, 133, 244, 0.4);
        }

        .channel-logo-container {
            height: 70px; 
            background: #2a2d35;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .channel-logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .channel-info {
            padding: 8px 10px;
        }

        .channel-title {
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 150px;
            width: 100%;
        }

        .d-none { display: none !important; }

        .custom-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem 0;
            margin-top: 3rem;
            padding-bottom: 5rem; /* Extra padding for scrolling comfort */
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark fixed-top navbar-glass px-0">
        <div class="container h-100 flex-nowrap align-items-center">
            <a class="navbar-brand brand-logo m-0 me-4" href="#">
                <i class="bi bi-play-btn-fill me-2 text-primary"></i>GENOIN
            </a>
            
            <div class="d-flex ai-search-box align-items-center flex-grow-1">
                <i class="bi bi-robot text-primary me-2"></i>
                <input type="text" id="channel-search" placeholder="AI Smart Search...">
                <i class="bi bi-search ms-2 text-secondary" style="cursor: pointer;"></i>
            </div>
        </div>
    </nav>

    <div class="sticky-player-wrapper w-100" id="sticky-player-wrapper">
        <div class="container px-3">
            
            <div class="hero-section rounded-4" id="hero-section">
                
                <div class="hero-bg-image" id="hero-bg"></div>

                <div class="hero-content w-100 px-4 px-md-5" id="hero-content">
                    <div class="row">
                        <div class="col-md-9">
                            <span class="ai-badge"><i class="bi bi-lightning-charge-fill me-1"></i> AI Recommended</span>
                            <h1 class="display-4 fw-bold mb-3 text-shadow">Live TV Hub</h1>
                            <p class="lead text-light mb-0" style="opacity: 0.8; font-size: 1.2rem;">genoin AI has analyzed your viewing habits. Select a channel below to start streaming immediately.</p>
                        </div>
                    </div>
                </div>

                <div class="video-container rounded-4" id="video-container">
                    <video id="main-player" playsinline></video>
                    
                    <div class="vignette"></div>

                    <div class="video-loader-overlay" id="video-loader">
                        <div class="spinner-border spinner-glow" id="loading-spinner" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <div class="mt-3 text-white fw-bold text-shadow fs-5" id="loader-text">Connecting...</div>
                    </div>
                    
                    <div class="player-overlay">
                        <div class="w-100 px-4 px-md-5">
                            <div class="player-info-hero">
                                <span class="live-badge mb-2"><i class="bi bi-record-circle-fill me-1"></i> LIVE NOW</span>
                                <div class="d-flex align-items-center mt-2">
                                    <img id="playing-logo" src="" alt="" height="60" class="me-3 shadow" style="object-fit: contain; border-radius: 8px; display: none; background: rgba(255,255,255,0.1); padding: 5px;">
                                    <h1 class="display-5 fw-bold mb-0 text-white text-shadow" id="playing-title">Loading Stream...</h1>
                                </div>
                            </div>

                            <div class="player-controls-bar">
                                <button class="control-btn" id="play-pause-btn"><i class="bi bi-pause-fill"></i></button>
                                <button class="control-btn ms-3" id="mute-btn" style="font-size: 1.5rem;"><i class="bi bi-volume-up-fill"></i></button>
                                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
                                <button class="control-btn ms-auto" id="fullscreen-btn"><i class="bi bi-arrows-fullscreen"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="main-content-overlay w-100">
        <div class="container">
            
            <div id="ai-picks-container" class="mb-5">
                <h5 class="mb-3 fw-bold"><i class="bi bi-stars text-warning me-2"></i>AI Smart Picks (Live Now)</h5>
                <div class="scrolling-wrapper" id="ai-picks-row"></div>
            </div>

            <h5 class="mb-3 fw-bold mt-4" id="all-channels-title">All Live Channels</h5>
            
            <div id="loader">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
            
            <div class="channel-grid" id="all-channels-grid"></div>

            <footer class="custom-footer text-center">
                <p class="text-secondary mb-0" style="font-size: 0.9rem; letter-spacing: 0.5px;">
                    Developed by Saidur
                </p>
            </footer>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const M3U_URL = 'https://raw.githubusercontent.com/bdtechexpert/live-tv-playlist/refs/heads/main/live-tv-playlist.m3u';
        let hlsInstance = null;
        let allChannelsData = [];
        let controlsTimeout; 

        // Player DOM Elements
        const video = document.getElementById('main-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const muteBtn = document.getElementById('mute-btn');
        const volumeSlider = document.getElementById('volume-slider');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const videoContainer = document.getElementById('video-container');
        const videoLoader = document.getElementById('video-loader');
        const loadingSpinner = document.getElementById('loading-spinner');
        const loaderText = document.getElementById('loader-text');
        
        // UI Elements
        const heroBg = document.getElementById('hero-bg');
        const heroContent = document.getElementById('hero-content');
        const playingTitle = document.getElementById('playing-title');
        const playingLogo = document.getElementById('playing-logo');
        const searchInput = document.getElementById('channel-search');

        async function fetchAndParseM3U() {
            try {
                const response = await fetch(M3U_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const textData = await response.text();
                
                const lines = textData.split('\n');
                let currentChannel = { name: '', logo: '', url: '', id: 0 };
                let idCounter = 1;

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    if (line.startsWith('#EXTINF:')) {
                        const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                        currentChannel.logo = logoMatch ? logoMatch[1] : 'https://via.placeholder.com/150x80/2a2d35/FFFFFF?text=No+Logo';
                        
                        const nameSplit = line.split(',');
                        currentChannel.name = nameSplit.length > 1 ? nameSplit[1] : 'Unknown Channel';
                    } 
                    else if (line.startsWith('http')) {
                        currentChannel.url = line;
                        currentChannel.id = idCounter++;
                        allChannelsData.push({...currentChannel});
                        currentChannel = { name: '', logo: '', url: '', id: 0 }; 
                    }
                }
                
                document.getElementById('loader').style.display = 'none';
                renderChannels(allChannelsData);

            } catch (error) {
                console.error('Error fetching M3U:', error);
                document.getElementById('loader').innerHTML = `<p class="text-danger">Failed to load channels. Check CORS or URL.</p>`;
            }
        }

        function createChannelCardHTML(channel) {
            const channelData = encodeURIComponent(JSON.stringify(channel));
            return `
                <div class="channel-card" id="card-${channel.id}" data-name="${channel.name.toLowerCase()}" onclick="playStream('${channelData}')">
                    <div class="channel-logo-container">
                        <img src="${channel.logo}" alt="${channel.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/150x80/2a2d35/FFFFFF?text=TV'">
                    </div>
                    <div class="channel-info">
                        <div class="channel-title">${channel.name}</div>
                        <small class="text-success"><i class="bi bi-record-circle-fill me-1" style="font-size: 0.6rem;"></i>Live</small>
                    </div>
                </div>
            `;
        }

        function renderChannels(channels) {
            const aiPicksRow = document.getElementById('ai-picks-row');
            const allChannelsGrid = document.getElementById('all-channels-grid');
            
            // Populate AI Picks Row
            const aiPicks = [...channels].sort(() => 0.5 - Math.random()).slice(0, 10); 
            aiPicksRow.innerHTML = aiPicks.map(createChannelCardHTML).join('');
            
            // Populate Main Grid
            allChannelsGrid.innerHTML = channels.map(createChannelCardHTML).join('');
        }

        // --- Live Search / Filtering Logic ---
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const aiPicksContainer = document.getElementById('ai-picks-container');
            const allChannelsTitle = document.getElementById('all-channels-title');
            const allCards = document.querySelectorAll('#all-channels-grid .channel-card');

            if (searchTerm.length > 0) {
                aiPicksContainer.classList.add('d-none');
                allChannelsTitle.textContent = `Search Results for "${e.target.value}"`;
            } else {
                aiPicksContainer.classList.remove('d-none');
                allChannelsTitle.textContent = 'All Live Channels';
            }

            allCards.forEach(card => {
                const channelName = card.getAttribute('data-name');
                if (channelName.includes(searchTerm)) {
                    card.classList.remove('d-none');
                } else {
                    card.classList.add('d-none');
                }
            });
        });

        // --- Video Player Logic ---
        function playStream(encodedData) {
            const channel = JSON.parse(decodeURIComponent(encodedData));

            // UI Transitions: Hide Hero, Show Video & Reset Loader
            heroBg.style.opacity = '0';
            heroContent.style.opacity = '0';
            
            loadingSpinner.style.display = 'inline-block';
            loaderText.innerText = "Connecting...";
            loaderText.classList.remove('text-danger');
            
            // Auto scroll to top to view player perfectly
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            setTimeout(() => {
                heroBg.style.display = 'none';
                heroContent.style.display = 'none';
                videoContainer.style.display = 'block';
                videoLoader.style.display = 'block'; 
            }, 500);

            // Update Control Bar Info
            playingTitle.textContent = channel.name;
            playingLogo.src = channel.logo;
            playingLogo.style.display = 'block';

            // Highlight active card
            document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active'));
            document.querySelectorAll(`#card-${channel.id}`).forEach(el => el.classList.add('active'));

            // HLS Video Integration
            if (Hls.isSupported()) {
                if (hlsInstance) { hlsInstance.destroy(); }
                hlsInstance = new Hls();
                hlsInstance.loadSource(channel.url);
                hlsInstance.attachMedia(video);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
                    video.play().catch(e => console.log("Autoplay blocked:", e));
                    updatePlayPauseUI();
                });

                // Error Catching for HLS
                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        loadingSpinner.style.display = 'none';
                        loaderText.innerText = "Stream Offline / Unavailable";
                        loaderText.classList.add('text-danger');
                    }
                });
            } 
            // Native HTML5 fallback (Safari/iOS)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.addEventListener('loadedmetadata', function () {
                    video.play();
                    updatePlayPauseUI();
                });
            }
        }

        // Catch native video errors
        video.addEventListener('error', () => {
            loadingSpinner.style.display = 'none';
            loaderText.innerText = "Stream Offline / Unavailable";
            loaderText.classList.add('text-danger');
        });

        // --- Loader & Playback Events ---
        video.addEventListener('waiting', () => {
            videoLoader.style.display = 'block';
        });
        
        video.addEventListener('playing', () => {
            videoLoader.style.display = 'none';
            loaderText.innerText = "Connecting..."; 
            loaderText.classList.remove('text-danger');
            updatePlayPauseUI();
        });

        video.addEventListener('canplay', () => {
            videoLoader.style.display = 'none';
        });

        video.addEventListener('pause', updatePlayPauseUI);

        // --- Custom Player Controls UI ---
        function updatePlayPauseUI() {
            if (video.paused) {
                playPauseBtn.innerHTML = '<i class="bi bi-play-fill"></i>';
            } else {
                playPauseBtn.innerHTML = '<i class="bi bi-pause-fill"></i>';
            }
        }

        playPauseBtn.addEventListener('click', () => {
            if (video.paused) { video.play(); } 
            else { video.pause(); }
            updatePlayPauseUI();
        });

        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            if (video.muted || video.volume === 0) {
                muteBtn.innerHTML = '<i class="bi bi-volume-mute-fill"></i>';
                volumeSlider.value = 0;
            } else {
                muteBtn.innerHTML = '<i class="bi bi-volume-up-fill"></i>';
                volumeSlider.value = video.volume;
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            video.volume = e.target.value;
            video.muted = false;
            if (video.volume == 0) { muteBtn.innerHTML = '<i class="bi bi-volume-mute-fill"></i>'; } 
            else if (video.volume < 0.5) { muteBtn.innerHTML = '<i class="bi bi-volume-down-fill"></i>'; } 
            else { muteBtn.innerHTML = '<i class="bi bi-volume-up-fill"></i>'; }
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                if (videoContainer.requestFullscreen) { videoContainer.requestFullscreen(); }
                else if (videoContainer.webkitRequestFullscreen) { videoContainer.webkitRequestFullscreen(); } // Safari
                else if (videoContainer.msRequestFullscreen) { videoContainer.msRequestFullscreen(); } // IE11
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                else if (document.msExitFullscreen) { document.msExitFullscreen(); }
            }
        });

        // --- FULLSCREEN AUTO-HIDE LOGIC ---
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

        function handleFullscreenChange() {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                videoContainer.classList.add('is-fullscreen');
                resetControlsTimeout();
            } else {
                videoContainer.classList.remove('is-fullscreen');
                videoContainer.classList.remove('hide-controls');
                clearTimeout(controlsTimeout);
            }
        }

        videoContainer.addEventListener('mousemove', () => {
            if (videoContainer.classList.contains('is-fullscreen')) {
                videoContainer.classList.remove('hide-controls');
                resetControlsTimeout();
            }
        });

        function resetControlsTimeout() {
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (videoContainer.classList.contains('is-fullscreen')) {
                    videoContainer.classList.add('hide-controls');
                }
            }, 3000); 
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', fetchAndParseM3U);
    </script>
</body>
</html>
