<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENOIN - FIFA26 Edition</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- HLS.js for M3U8 Stream Playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    
    <style>
        /* Bangladeshi UI Theme & Premium Background */
        :root {
            --bd-green: #006a4e;
            --bd-green-dark: #034b38;
            --bd-red: #ed1c24;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
          background: linear-gradient(rgba(5, 16, 10, 0.85), rgba(5, 16, 10, 0.85)), url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        /* Navbar Styling */
        .navbar-custom {
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 16, 10, 0.85);
            backdrop-filter: blur(10px);
        }

        /* Branding & Live Animation */
        .brand-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-dot {
            width: 12px;
            height: 12px;
            background-color: var(--bd-red);
            border-radius: 50%;
            display: inline-block;
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(237, 28, 36, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(237, 28, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(237, 28, 36, 0); }
        }

        .brand-logo {
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #ffffff !important;
            font-size: 1.5rem;
            margin: 0;
            line-height: 1;
        }

        .edition-badge {
            font-size: 0.65rem;
            background: linear-gradient(45deg, var(--bd-green), #119971);
            color: white;
            padding: 3px 8px;
            border-radius: 6px;
            letter-spacing: 0.5px;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            top: -2px;
        }

        /* Video Player Area */
        .player-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 106, 78, 0.3);
        }

        #video-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Hidden until playback starts */
            background: #000;
        }

        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), 
                        repeating-linear-gradient(0deg, #0a2e1c, #0a2e1c 40px, #0c3621 40px, #0c3621 80px);
            z-index: 2;
        }

        .loader {
            display: none;
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--bd-red);
            border-radius: 50%;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Sidebar Channel List */
        .sidebar-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
        }

        .channel-list-container {
            flex-grow: 1;
            overflow-y: auto;
        }

        /* Custom Scrollbar for Playlist */
        .channel-list-container::-webkit-scrollbar { width: 5px; }
        .channel-list-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .channel-list-container::-webkit-scrollbar-thumb { background: var(--bd-green); border-radius: 10px; }

        .channel-item {
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
        }

        .channel-item:hover { background: rgba(255, 255, 255, 0.05); }

        .channel-item.active {
            background: linear-gradient(90deg, rgba(0, 106, 78, 0.4) 0%, rgba(0, 0, 0, 0.2) 100%);
            border-left: 4px solid var(--bd-red);
            border-right: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
        }

        .channel-logo {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .channel-logo img { width: 100%; height: 100%; object-fit: contain; }

        .channel-info h6 { margin: 0 0 3px 0; font-size: 0.95rem; font-weight: 600; }
        .channel-info p { margin: 0; font-size: 0.8rem; color: #a0aec0; }

        /* Category Headers */
        .category-header {
            background: rgba(0, 106, 78, 0.15);
            padding: 8px 12px;
            border-radius: 8px;
            margin: 15px 0 10px 0;
            font-size: 0.75rem;
            font-weight: 800;
            color: #119971;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(0, 106, 78, 0.2);
        }

        .category-header:first-child { margin-top: 0; }
        
        .category-header i {
            transition: transform 0.3s ease;
        }
        
        .category-header.collapsed i {
            transform: rotate(-90deg);
        }

        /* Status Indicators */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .status-online { background-color: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .status-offline { background-color: #ff3333; box-shadow: 0 0 8px #ff3333; }
        .status-checking { background-color: #ffcc00; animation: blink 1s infinite; }

        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        /* Custom Input */
        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .search-input:focus {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
            border-color: var(--bd-green) !important;
            color: white;
        }
        .search-input::placeholder { color: #a0aec0; }

        /* Select styling for dark theme */
        select.search-input option {
            background: #0a2e1c;
            color: white;
        }

        .input-group-text {
            border-color: rgba(255,255,255,0.1);
        }

        /* Viewer Count Badge */
        .viewer-badge {
            background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            font-weight: 600 !important;
            letter-spacing: 0.5px;
        }
        
        .viewer-count-animate {
            animation: count-pulse 0.5s ease-out;
        }
        
        @keyframes count-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); color: #0dcaf0; }
            100% { transform: scale(1); }
        }

    </style>
</head>

    <!-- Application Logic -->
    <script>
        const M3U_URL = "https://raw.githubusercontent.com/SHAJON-404/iptv/refs/heads/main/app/data/fifa.m3u";
        let channelsData = [];
        let hlsInstance = null;
        let collapsedCategories = new Set();
        
        const channelListEl = document.getElementById('channel-list');
        const searchInput = document.getElementById('channel-search');
        const categoryFilter = document.getElementById('category-filter');
        const videoPlayer = document.getElementById('video-player');
        const videoPlaceholder = document.getElementById('video-placeholder');
        const playerLoader = document.getElementById('player-loader');
        const pipBtn = document.getElementById('pip-btn');

        // Viewer Count Simulation Logic
        let viewerInterval = null;
        let currentViewers = 0;
        let globalVisitors = 0;

        function startGlobalVisitorCount() {
            // Using CounterAPI.dev for real-time hit tracking
            const namespace = "genoin_fifa2026"; // Unique for your site
            const key = "live_visits";

            // Increment count on load
            fetch(`https://api.counterapi.dev/v1/${namespace}/${key}/up`)
                .then(res => res.json())
                .then(data => {
                    globalVisitors = data.count;
                    updateGlobalVisitorUI();
                })
                .catch(err => {
                    console.error("CounterAPI Error:", err);
                    // Fallback to a safe number if API is down
                    globalVisitors = 1200;
                    updateGlobalVisitorUI();
                });

            // Periodically refresh the count to see others visiting
            setInterval(() => {
                fetch(`https://api.counterapi.dev/v1/${namespace}/${key}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.count > globalVisitors) {
                            globalVisitors = data.count;
                            updateGlobalVisitorUI();
                        }
                    });
            }, 10000); // Check every 10 seconds
        }

        function updateGlobalVisitorUI() {
            const el = document.getElementById('global-visitor-count');
            if (el) el.innerText = globalVisitors.toLocaleString();
        }

        function startViewerCount(channelName) {
            if (viewerInterval) clearInterval(viewerInterval);
            
            const viewerContainer = document.getElementById('viewer-container');
            viewerContainer.style.display = 'inline-flex';
            
            const namespace = "genoin_fifa2026";
            // Create a clean key from the channel name
            const channelKey = "ch_" + channelName.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();

            // Increment channel specific count
            fetch(`https://api.counterapi.dev/v1/${namespace}/${channelKey}/up`)
                .then(res => res.json())
                .then(data => {
                    currentViewers = data.count;
                    updateViewerUI();
                })
                .catch(() => {
                    currentViewers = Math.floor(Math.random() * 50) + 1; // Minimal fallback
                    updateViewerUI();
                });

            // Refresh channel count every 15 seconds
            viewerInterval = setInterval(() => {
                fetch(`https://api.counterapi.dev/v1/${namespace}/${channelKey}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.count > currentViewers) {
                            currentViewers = data.count;
                            updateViewerUI();
                        }
                    });
            }, 15000);
        }

        function updateViewerUI() {
            const el = document.getElementById('viewer-count');
            const container = document.getElementById('viewer-container');
            if (el) el.innerText = currentViewers.toLocaleString();
            
            // Trigger animation
            if (container) {
                container.classList.remove('viewer-count-animate');
                void container.offsetWidth; // trigger reflow
                container.classList.add('viewer-count-animate');
            }
        }

        // Fetch and parse the M3U file
        async function fetchM3U() {
            try {
                const response = await fetch(M3U_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                const text = await response.text();
                parseM3U(text);
                // Start background validation after a short delay
                setTimeout(startBackgroundValidation, 2000);
            } catch (error) {
                console.error("Error fetching M3U:", error);
                channelListEl.innerHTML = `<p class="text-danger text-center mt-4"><i class="bi bi-exclamation-triangle"></i> Failed to load channels.<br>Check your internet or CORS policy.</p>`;
            }
        }

        // Parse M3U tags into JS objects
        function parseM3U(data) {
            const lines = data.split('\n');
            let currentChannel = null;
            channelsData = [];

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    currentChannel = { status: 'unchecked' };
                    
                    // Extract Logo
                    const logoMatch = line.match(/tvg-logo="(.*?)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : '';

                    // Extract Group
                    const groupMatch = line.match(/group-title="(.*?)"/);
                    currentChannel.group = groupMatch ? groupMatch[1] : 'Live TV';

                    // Extract Name (Everything after the last comma)
                    const nameParts = line.split(',');
                    currentChannel.name = nameParts.length > 1 ? nameParts[nameParts.length - 1].trim() : 'Unknown Channel';
                } 
                else if (line && !line.startsWith('#') && currentChannel) {
                    currentChannel.url = line;
                    channelsData.push(currentChannel);
                    currentChannel = null; // Reset for next loop
                }
            });

            renderChannels(channelsData);
            populateCategoryFilter();
        }

        // Populate Category Dropdown
        function populateCategoryFilter() {
            const currentSelection = categoryFilter.value;
            const categories = [...new Set(channelsData.map(c => c.group))].sort();
            
            categoryFilter.innerHTML = '<option value="all">All Categories</option>';
            categories.forEach(cat => {
                const catChannels = channelsData.filter(c => c.group === cat);
                const online = catChannels.filter(c => c.status === 'online').length;
                const offline = catChannels.filter(c => c.status === 'offline').length;
                const total = catChannels.length;

                const opt = document.createElement('option');
                opt.value = cat;
                // Format: Category Name (Total | Online)
                opt.innerText = `${cat} (${total} T | ${online} ON)`;
                categoryFilter.appendChild(opt);
            });
            categoryFilter.value = currentSelection;
        }

        // Render the channel HTML list with Categorization
        function renderChannels(channels) {
            updateStatusSummary();
            channelListEl.innerHTML = '';
            
            if (channels.length === 0) {
                channelListEl.innerHTML = `<p class="text-secondary text-center mt-4">No channels found.</p>`;
                return;
            }

            // Group channels by category
            const groups = {};
            channels.forEach(channel => {
                if (!groups[channel.group]) groups[channel.group] = [];
                groups[channel.group].push(channel);
            });

            // Sort groups alphabetically
            const sortedGroups = Object.keys(groups).sort();

            // Special Case: If only one category is shown (filtered), don't show the redundant header
            const isSingleCategory = sortedGroups.length === 1 && categoryFilter.value !== 'all';

            sortedGroups.forEach(groupName => {
                const groupChannels = groups[groupName];
                const isCollapsed = collapsedCategories.has(groupName);

                if (!isSingleCategory) {
                    const online = groupChannels.filter(c => c.status === 'online').length;
                    const offline = groupChannels.filter(c => c.status === 'offline').length;
                    const total = groupChannels.length;

                    // Create Category Header
                    const header = document.createElement('div');
                    header.className = `category-header ${isCollapsed ? 'collapsed' : ''}`;
                    header.innerHTML = `
                        <div class="d-flex flex-column">
                            <span>${groupName}</span>
                            <div style="font-size: 0.6rem; opacity: 0.7; font-weight: 400; letter-spacing: 0.5px; margin-top: 2px;">
                                <span class="text-success">${online} ON</span> • 
                                <span class="text-danger">${offline} OFF</span> • 
                                <span>${total} TOTAL</span>
                            </div>
                        </div>
                        <i class="bi bi-chevron-down"></i>
                    `;
                    header.onclick = () => {
                        if (collapsedCategories.has(groupName)) {
                            collapsedCategories.delete(groupName);
                        } else {
                            collapsedCategories.add(groupName);
                        }
                        applyFilters(); // Re-filter to show/hide
                    };
                    channelListEl.appendChild(header);
                }

                // Create Group Container
                if (!isCollapsed || isSingleCategory) {
                    const groupContainer = document.createElement('div');
                    groupChannels.forEach((channel) => {
                        const item = document.createElement('div');
                        item.className = `channel-item ${videoPlayer.src === channel.url ? 'active' : ''}`;
                        item.onclick = () => playChannel(channel, item);

                        // Status Badge
                        let statusClass = 'status-checking';
                        if (channel.status === 'online') statusClass = 'status-online';
                        if (channel.status === 'offline') statusClass = 'status-offline';
                        if (channel.status === 'unchecked') statusClass = '';

                        // Handle logo display
                        const logoHtml = channel.logo 
                            ? `<img src="${channel.logo}" alt="${channel.name}" onerror="this.outerHTML='<i class=\\'bi bi-tv\\'></i>'">`
                            : `<i class="bi bi-tv"></i>`;

                        item.innerHTML = `
                            <div class="channel-logo">
                                ${logoHtml}
                            </div>
                            <div class="channel-info flex-grow-1">
                                <h6 class="text-white text-truncate" style="max-width: 150px;">
                                    ${statusClass ? `<span class="status-dot ${statusClass}"></span>` : ''}
                                    ${channel.name}
                                </h6>
                                <p class="text-truncate" style="max-width: 150px;">${channel.group}</p>
                            </div>
                            <div class="channel-stats text-end">
                                <span class="badge rounded-pill bg-dark border border-secondary border-opacity-25" style="font-size: 0.65rem; color: #0dcaf0 !important;">
                                    <i class="bi bi-eye-fill me-1"></i> <span class="ch-list-count" data-ch-name="${channel.name}">...</span>
                                </span>
                            </div>
                        `;
                        groupContainer.appendChild(item);
                    });
                    channelListEl.appendChild(groupContainer);
                }
            });

            // After rendering, fetch counts for visible channels (Lazy approach)
            updateListCounts();
        }

        // Fetch counts for channels in the list
        async function updateListCounts() {
            const counts = document.querySelectorAll('.ch-list-count');
            const namespace = "genoin_fifa2026";
            
            counts.forEach(async (el) => {
                const name = el.getAttribute('data-ch-name');
                const channelKey = "ch_" + name.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
                
                try {
                    const res = await fetch(`https://api.counterapi.dev/v1/${namespace}/${channelKey}`);
                    const data = await res.json();
                    el.innerText = data.count.toLocaleString();
                } catch {
                    el.innerText = "0";
                }
            });
        }

        function updateStatusSummary() {
            const online = channelsData.filter(c => c.status === 'online').length;
            const offline = channelsData.filter(c => c.status === 'offline').length;
            const total = channelsData.length;

            document.getElementById('stat-online').innerText = `${online} Online`;
            document.getElementById('stat-offline').innerText = `${offline} Offline`;
            document.getElementById('stat-total').innerText = `${total} Total`;
        }

        // Background Validation Logic
        async function startBackgroundValidation() {
            // Validate in batches of 3 to avoid blocking too much
            for (let i = 0; i < channelsData.length; i += 3) {
                const batch = channelsData.slice(i, i + 3);
                await Promise.all(batch.map(validateChannel));
                
                // Update UI every batch for visual feedback
                if (searchInput.value === '' && categoryFilter.value === 'all') { 
                    renderChannels(channelsData);
                } else {
                    updateStatusSummary();
                }
                
                // Refresh dropdown counts every batch
                populateCategoryFilter();
            }
        }

        async function validateChannel(channel) {
            if (channel.status !== 'unchecked') return;
            
            channel.status = 'checking';
            // We use a small fetch with a timeout to check availability
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000); // 8s timeout

                const urlToCheck = channel.url.startsWith('http://') 
                    ? `https://api.allorigins.win/raw?url=${encodeURIComponent(channel.url)}`
                    : channel.url;

                await fetch(urlToCheck, { 
                    method: 'GET', 
                    mode: 'no-cors',
                    signal: controller.signal 
                });
                
                clearTimeout(timeoutId);
                channel.status = 'online';
            } catch (error) {
                channel.status = 'offline';
            }
        }

        // Unified Filter Logic
        function applyFilters() {
            const searchQuery = searchInput.value.toLowerCase();
            const selectedCategory = categoryFilter.value;

            const filtered = channelsData.filter(c => {
                const matchesSearch = c.name.toLowerCase().includes(searchQuery);
                const matchesCategory = selectedCategory === 'all' || c.group === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            renderChannels(filtered);
        }

        // Event Listeners for Filtering
        searchInput.addEventListener('input', applyFilters);
        categoryFilter.addEventListener('change', applyFilters);

        // Playback Engine
        function playChannel(channel, itemElement) {
            // UI Active State updates
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            if(itemElement) itemElement.classList.add('active');

            // Update Info Panel
            document.getElementById('current-channel-title').innerText = channel.name;
            document.getElementById('current-channel-group').innerText = channel.group;

            // Start Real-time Channel Viewer Count
            startViewerCount(channel.name);

            // Update the count in the list immediately as well
            const listCountEl = document.querySelector(`.ch-list-count[data-ch-name="${channel.name}"]`);
            if (listCountEl) {
                // We know it just went up because startViewerCount called /up
                // but fetching the latest is safer
                setTimeout(() => {
                    const namespace = "genoin_fifa2026";
                    const channelKey = "ch_" + channel.name.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
                    fetch(`https://api.counterapi.dev/v1/${namespace}/${channelKey}`)
                        .then(res => res.json())
                        .then(data => { listCountEl.innerText = data.count.toLocaleString(); });
                }, 1000);
            }

            // --- FIX: Reset Player UI State ---
            // Stop current playback
            videoPlayer.pause();
            videoPlayer.src = "";
            videoPlayer.load();
            videoPlayer.style.display = 'none';
            
            // Restore Placeholder Structure (In case it was overwritten by an error message)
            videoPlaceholder.style.display = 'flex';
            videoPlaceholder.innerHTML = `
                <i class="bi bi-tv" style="display: none; font-size: 4rem; color: rgba(255,255,255,0.5);"></i>
                <p class="mt-3 text-light fw-medium tracking-wide" style="display: none;">Select a channel from the list to stream</p>
                <span class="loader mt-3" id="player-loader" style="display: block;"></span>
            `;

            // Clean up previous HLS instance
            if (hlsInstance) {
                hlsInstance.destroy();
            }

            // --- FIX: Stealth Proxying for GitHub Hosting ---
            let finalUrl = channel.url;
            let isProxied = false;

            if (window.location.protocol === 'https:' && channel.url.startsWith('http://')) {
                // allorigins.win is often more reliable for media than other proxies
                finalUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(channel.url)}`;
                isProxied = true;
                console.log("Stealth proxying insecure stream for GitHub Pages:", channel.name);
            }

            // HLS Streaming Logic
            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    enableWorker: true,
                    manifestLoadingMaxRetry: 6,
                    levelLoadingMaxRetry: 6,
                    xhrSetup: function(xhr, url) {
                        // Some streams check the origin; clearing it can sometimes bypass blocks
                        // Note: Browsers protect some headers, but this setup is optimized for proxies
                        xhr.withCredentials = false;
                    }
                });
                
                hlsInstance.loadSource(finalUrl);
                hlsInstance.attachMedia(videoPlayer);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoPlaceholder.style.display = 'none';
                    videoPlayer.style.display = 'block';
                    videoPlayer.play().catch(e => {
                        console.error("Auto-play failed:", e);
                        videoPlayer.controls = true;
                    });
                });
                
                // Enhanced Error Recovery
                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        console.error("HLS Fatal Error:", data);
                        
                        // Fallback logic: If first proxy fails, try a secondary bypass
                        if (isProxied && !data.triedSecondary) {
                            console.log("Primary proxy failed, trying secondary bypass...");
                            data.triedSecondary = true;
                            let secondaryUrl = `https://corsproxy.io/?url=${encodeURIComponent(channel.url)}`;
                            hlsInstance.loadSource(secondaryUrl);
                        } else {
                            showError(isProxied 
                                ? "This HTTP stream is protected by the provider and cannot be played on a secure (HTTPS) GitHub host." 
                                : "Stream unplayable or offline.");
                            hlsInstance.destroy();
                        }
                    }
                });
            } 
            else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                videoPlayer.src = finalUrl;
                videoPlayer.onloadedmetadata = function() {
                    videoPlaceholder.style.display = 'none';
                    videoPlayer.style.display = 'block';
                    videoPlayer.play();
                };
                videoPlayer.onerror = function() {
                    showError("Native Playback Error: Stream offline.");
                };
            }
        }

        // Helper function to show errors without breaking the DOM structure
        function showError(message) {
            videoPlaceholder.style.display = 'flex';
            videoPlaceholder.innerHTML = `
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                <p class="mt-2 text-danger px-3 text-center">${message}</p>
                <button class="btn btn-sm btn-outline-light mt-2" onclick="location.reload()">Reload Player</button>
            `;
        }

        // Picture in Picture (PiP) Logic
        pipBtn.addEventListener('click', async () => {
            if (videoPlayer !== document.pictureInPictureElement) {
                try {
                    await videoPlayer.requestPictureInPicture();
                    pipBtn.classList.replace('btn-dark', 'btn-success');
                } catch (error) {
                    console.error("PiP not supported or failed", error);
                    alert("Picture-in-Picture is not supported in this browser or video hasn't started yet.");
                }
            } else {
                try {
                    await document.exitPictureInPicture();
                    pipBtn.classList.replace('btn-success', 'btn-dark');
                } catch (error) {
                    console.error("Failed to exit PiP", error);
                }
            }
        });

        // Initialize App
        fetchM3U();
        startGlobalVisitorCount();
        
        // Periodically refresh list counts every 60 seconds
        setInterval(updateListCounts, 60000);
        
    </script>
    
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
